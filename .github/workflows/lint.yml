name: Lint Code

on:
  push:
    branches: ["master"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Tools
        run: |
          pip install flake8 black

      - name: Run Flake8
        run: flake8 .

      - name: Check Formatting
        run: black . --check
